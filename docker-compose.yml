services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: GardenTracker.Api/Dockerfile
    ports:
      - "5280:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=GardenTracker;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "${JWT_ISSUER:-gardentracker}"
      Jwt__Audience: "${JWT_AUDIENCE:-gardentracker}"
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
    depends_on:
      - db

  web:
    build:
      context: ./GardenTracker.Web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:5280}"
    depends_on:
      - api

volumes:
  sqldata:
